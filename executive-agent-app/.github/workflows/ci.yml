name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pytest cryptography pyyaml requests

      - name: Run audit-fix unit tests
        shell: pwsh
        working-directory: executive-agent-app
        run: |
          python -m pytest tests/test_credential_store.py tests/test_profile_paths.py tests/test_secrets.py tests/test_model_router_fallback.py tests/test_permissions_audit.py tests/test_agent_loop_sanitize.py -v

      - name: Smoke test
        shell: pwsh
        working-directory: executive-agent-app
        run: python tests/smoke_test_v27.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
